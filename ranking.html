<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>랭킹 — 퀴즈퀴즈</title>
<link rel="stylesheet" href="css/style.css">
<style>
.rank-hero {
  background: linear-gradient(135deg, #1a1845, #1a2540);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 28px;
  text-align: center;
  margin-bottom: 24px;
}
.rank-hero h1 { font-size: 26px; font-weight: 900; margin-bottom: 6px; }
.rank-hero p  { color: var(--muted); font-size: 14px; }

/* TOP 3 */
.podium {
  display: flex; align-items: flex-end; justify-content: center;
  gap: 12px; margin-bottom: 28px;
}
.podium-item { text-align: center; }
.podium-item.first  { order: 2; }
.podium-item.second { order: 1; }
.podium-item.third  { order: 3; }
.podium-avatar {
  width: 56px; height: 56px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700; color: #fff;
  margin: 0 auto 8px;
}
.first  .podium-avatar { background: linear-gradient(135deg, #ffd700, #ffb300); width:68px;height:68px;font-size:26px; }
.second .podium-avatar { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); }
.third  .podium-avatar { background: linear-gradient(135deg, #cd7f32, #b06020); }
.podium-nick { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
.podium-xp   { font-size: 12px; color: var(--muted); }
.podium-stand {
  margin-top: 10px; border-radius: 8px 8px 0 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 900;
}
.first  .podium-stand { height: 70px; background: rgba(255,215,0,.2); border: 1px solid rgba(255,215,0,.3); color: var(--yellow); }
.second .podium-stand { height: 54px; background: rgba(192,192,192,.15); border: 1px solid rgba(192,192,192,.2); color: #c0c0c0; }
.third  .podium-stand { height: 40px; background: rgba(205,127,50,.15); border: 1px solid rgba(205,127,50,.2); color: #cd7f32; }

/* 랭킹 테이블 */
.rank-table { margin-bottom: 24px; }
.rank-row {
  display: flex; align-items: center; gap: 14px;
  padding: 13px 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 8px;
  transition: border-color .15s;
}
.rank-row.mine { border-color: var(--yellow); background: rgba(255,209,102,.05); }
.rank-row:hover { border-color: var(--primary-l); }
.rank-num { width: 28px; text-align: center; font-size: 14px; font-weight: 900; color: var(--muted); flex-shrink: 0; }
.rank-num.r1 { color: var(--yellow); font-size: 18px; }
.rank-num.r2 { color: #c0c0c0; font-size: 16px; }
.rank-num.r3 { color: #cd7f32; font-size: 16px; }
.rank-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-l));
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.rank-info { flex: 1; min-width: 0; }
.rank-nick { font-size: 14px; font-weight: 700; }
.rank-detail { font-size: 12px; color: var(--muted); margin-top: 1px; }
.rank-xp { font-size: 15px; font-weight: 900; color: var(--primary-l); }
.rank-level { font-size: 12px; color: var(--muted); text-align: right; }

/* 내 순위 고정 */
.my-rank-fixed {
  position: sticky; bottom: 20px;
  background: rgba(255,209,102,.12);
  border: 1.5px solid rgba(255,209,102,.35);
  border-radius: 14px;
  padding: 13px 16px;
  display: flex; align-items: center; gap: 14px;
  margin-top: 16px;
  backdrop-filter: blur(10px);
}
</style>
</head>
<body>

<div class="topbar" id="topbar"></div>

<div class="page">
  <div class="rank-hero">
    <h1>🏆 전체 랭킹</h1>
    <p>누적 XP 기준 전체 순위 · 실시간 갱신</p>
  </div>

  <div id="podiumSection"><div class="spinner"></div></div>
  <div class="rank-table" id="rankTable"></div>
  <div id="myRankFixed"></div>
</div>

<div id="toast-container"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script>
const user = Auth.require();
if (!user) throw new Error('not logged in');
renderTopbar(user);

async function loadRanking() {
  try {
    const res = await API.getRanking();
    const users = (res.data || []).sort((a,b) => (b.xp||0)-(a.xp||0));
    const top3 = users.slice(0, 3);
    const rest = users.slice(3, 100);
    const myRank = users.findIndex(u => u.id === user.id) + 1;
    const myData = users.find(u => u.id === user.id);

    // 포디움
    if (top3.length > 0) {
      const podiumOrder = [top3[1], top3[0], top3[2]].filter(Boolean);
      const cls = ['second','first','third'];
      const medals = ['🥈','🥇','🥉'];
      document.getElementById('podiumSection').innerHTML = `
        <div class="podium">
          ${podiumOrder.map((u2, i) => {
            if (!u2) return '';
            const origRank = top3.indexOf(u2);
            return `
              <div class="podium-item ${cls[i]}">
                <div class="podium-avatar">${u2.nickname[0].toUpperCase()}</div>
                <div class="podium-nick">${u2.nickname}</div>
                <div class="podium-xp">${(u2.xp||0).toLocaleString()} XP</div>
                <div class="podium-stand">${medals[i]}</div>
              </div>`;
          }).join('')}
        </div>`;
    } else {
      document.getElementById('podiumSection').innerHTML = '';
    }

    // 랭킹 테이블 (4위~)
    if (rest.length > 0) {
      document.getElementById('rankTable').innerHTML = rest.map((u2, i) => {
        const rank = i + 4;
        const isMe = u2.id === user.id;
        const level = Auth.calcLevel(u2.xp || 0);
        const wr = u2.total_games > 0 ? Math.round(u2.wins/u2.total_games*100) : 0;
        return `
          <div class="rank-row ${isMe?'mine':''}">
            <div class="rank-num">${rank}</div>
            <div class="rank-avatar">${u2.nickname[0].toUpperCase()}</div>
            <div class="rank-info">
              <div class="rank-nick">${u2.nickname} ${isMe?'<span class="badge badge-yellow">나</span>':''}</div>
              <div class="rank-detail">${u2.total_games||0}전 ${u2.wins||0}승 (승률 ${wr}%)</div>
            </div>
            <div>
              <div class="rank-xp">${(u2.xp||0).toLocaleString()}</div>
              <div class="rank-level">Lv.${level} ${Auth.title(level)}</div>
            </div>
          </div>`;
      }).join('');
    }

    // 내 순위 고정 바
    if (myData) {
      const level = Auth.calcLevel(myData.xp||0);
      document.getElementById('myRankFixed').innerHTML = `
        <div class="my-rank-fixed">
          <div class="rank-num" style="color:var(--yellow);font-size:16px;font-weight:900">${myRank}위</div>
          <div class="rank-avatar" style="background:linear-gradient(135deg,var(--yellow),#ff9f43);color:#111">${myData.nickname[0].toUpperCase()}</div>
          <div class="rank-info">
            <div class="rank-nick">나 · ${myData.nickname}</div>
            <div class="rank-detail">Lv.${level} ${Auth.title(level)}</div>
          </div>
          <div>
            <div class="rank-xp" style="color:var(--yellow)">${(myData.xp||0).toLocaleString()}</div>
            <div class="rank-level">총 XP</div>
          </div>
        </div>`;
    }

    // TOP 3 없으면 랭킹 테이블에서도 처리
    if (users.length === 0) {
      document.getElementById('podiumSection').innerHTML = `<div class="empty-state"><div class="emo">🏆</div><p>아직 랭킹 데이터가 없습니다.<br>첫 번째 게임을 시작해보세요!</p></div>`;
    }
  } catch(e) {
    showToast('랭킹을 불러올 수 없습니다.', 'error');
  }
}

loadRanking();
</script>
</body>
</html>
